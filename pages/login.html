<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ログイン - mirAI Curriculum</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/styles.css" />
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'Noto Sans JP', 'sans-serif'] }, colors: { violet: { 500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9'}, pink: { 500:'#ec4899',600:'#db2777'}, cyan: {500:'#06b6d4'} } } } };
</script>
</head>
<body class="font-sans bg-mesh min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Animated background -->
<div class="absolute top-0 -left-20 w-96 h-96 bg-cyan-400 rounded-full blur-3xl opacity-30 float"></div>
<div class="absolute bottom-0 -right-20 w-96 h-96 bg-pink-500 rounded-full blur-3xl opacity-30 float-delay"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-violet-500 rounded-full blur-3xl opacity-20 float-slow"></div>

<div class="relative w-full max-w-md">
  <a href="../index.html" class="flex items-center justify-center gap-3 mb-8 group">
    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-500 via-violet-500 to-pink-500 flex items-center justify-center text-white font-black text-2xl shadow-2xl shadow-violet-500/40 group-hover:scale-110 group-hover:rotate-6 transition">m</div>
    <span class="font-black text-slate-900 text-2xl">mirAI <span class="gradient-text">Curriculum</span></span>
  </a>

  <div class="glass rounded-3xl shadow-2xl shadow-violet-500/20 p-8 scale-in">
    <!-- Role tabs -->
    <div class="grid grid-cols-2 gap-1 p-1.5 bg-slate-100/80 rounded-2xl mb-7" id="role-tabs">
      <button data-role="company" class="role-tab py-3 rounded-xl text-sm font-bold transition">🏢 企業</button>
      <button data-role="teacher" class="role-tab py-3 rounded-xl text-sm font-bold transition">🎓 教員</button>
    </div>

    <h1 class="text-3xl font-black mb-2"><span id="role-label" class="gradient-text-signature">企業</span>ログイン</h1>
    <p class="text-sm text-slate-500 mb-6">発行されたIDでアプリにアクセスします。</p>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="text-xs font-black text-slate-700 block mb-1.5 tracking-wider">発行ID</label>
        <input id="user-id" type="text" placeholder="例: COMP-DEMO" required
          class="vibrant-input text-base" />
        <p class="text-[11px] text-slate-400 mt-2 flex items-center gap-1.5">💡 デモ用ID: <code class="bg-violet-50 text-violet-700 px-2 py-0.5 rounded font-mono font-bold">COMP-DEMO</code> / <code class="bg-pink-50 text-pink-700 px-2 py-0.5 rounded font-mono font-bold">TEACH-DEMO</code></p>
      </div>
      <div>
        <label class="text-xs font-black text-slate-700 block mb-1.5 tracking-wider">パスワード（任意）</label>
        <input type="password" placeholder="••••••••" class="vibrant-input" />
      </div>
      <button type="submit" class="btn-signature w-full py-4 rounded-2xl text-base">
        ログイン →
      </button>
    </form>

    <div class="mt-6 pt-6 border-t border-violet-100 text-center">
      <p class="text-xs text-slate-500">アカウントをお持ちでない方は、運営事務局までお問い合わせください。</p>
    </div>
  </div>

  <div class="text-center mt-6">
    <a href="../index.html" class="text-xs text-slate-500 hover:text-violet-600 font-bold">← トップページに戻る</a>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/store.js"></script>
<script src="../js/main.js"></script>
<script>
  let currentRole = getQuery('role') || 'company';
  const updateUI = () => {
    document.querySelectorAll('.role-tab').forEach(b => {
      const active = b.dataset.role === currentRole;
      b.className = 'role-tab py-3 rounded-xl text-sm font-bold transition ' + (active ? (currentRole === 'company' ? 'bg-gradient-to-r from-cyan-500 to-violet-600 text-white shadow-lg shadow-violet-500/30' : 'bg-gradient-to-r from-violet-500 to-pink-500 text-white shadow-lg shadow-pink-500/30') : 'text-slate-500 hover:text-slate-700');
    });
    document.getElementById('role-label').textContent = currentRole === 'company' ? '企業' : '教員';
    document.getElementById('user-id').placeholder = currentRole === 'company' ? '例: COMP-DEMO' : '例: TEACH-DEMO';
  };
  document.querySelectorAll('.role-tab').forEach(b => {
    b.addEventListener('click', () => { currentRole = b.dataset.role; updateUI(); });
  });
  updateUI();

  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const userId = document.getElementById('user-id').value.trim().toUpperCase();
    const validIds = MIRAI_DATA.validIds[currentRole] || [];
    if (!validIds.includes(userId)) {
      toast(`未登録IDです。デモ用IDをお試しください: ${currentRole === 'company' ? 'COMP-DEMO' : 'TEACH-DEMO'}`, 'error');
      return;
    }
    STORE.login(currentRole, userId);
    toast('ログイン成功！', 'success');
    setTimeout(() => {
      window.location.href = currentRole === 'company' ? 'company-dashboard.html' : 'teacher-dashboard.html';
    }, 400);
  });
</script>
</body>
</html>
