<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>マイライブラリ - mirAI Curriculum</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/styles.css" />
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','Noto Sans JP','sans-serif'] }, colors: { violet: {500:'#8b5cf6',600:'#7c3aed'}, pink: {500:'#ec4899'}, cyan: {500:'#06b6d4'} } } } };
</script>
</head>
<body class="font-sans bg-mesh text-slate-900 antialiased">
<main class="p-8 max-w-7xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-3xl font-black">📚 マイ<span class="gradient-text">ライブラリ</span></h2>
      <p class="text-sm text-slate-500 mt-1 font-semibold">作成したカリキュラムを管理します</p>
    </div>
    <a href="industry-select.html" class="btn-signature px-6 py-3 rounded-2xl text-sm">+ 新規作成</a>
  </div>

  <!-- Filters -->
  <div class="glass rounded-2xl p-4 mb-5 flex flex-wrap items-center gap-3">
    <input id="search-q" type="text" placeholder="🔍 タイトル・テーマ・タグで検索..." class="vibrant-input flex-1 min-w-[200px] py-2" />
    <select id="filter-industry" class="vibrant-input vibrant-select max-w-[170px] py-2"></select>
    <select id="filter-subject" class="vibrant-input vibrant-select max-w-[160px] py-2"></select>
    <select id="filter-visibility" class="vibrant-input vibrant-select max-w-[170px] py-2"></select>
  </div>

  <div id="library-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 stagger"></div>
</main>

<script src="../js/data.js"></script>
<script src="../js/store.js"></script>
<script src="../js/main.js"></script>
<script src="../js/layout.js"></script>
<script>
  MIRAI_LAYOUT.render({ role: 'company', activeKey: 'library', title: 'マイライブラリ', subtitle: 'カリキュラム管理' });

  // 🔥 FIX: JSで動的に選択肢を生成
  document.getElementById('filter-industry').innerHTML =
    '<option value="">業界（全て）</option>' +
    MIRAI_DATA.industries.map(i => `<option value="${i.id}">${i.icon} ${i.name}</option>`).join('');

  document.getElementById('filter-subject').innerHTML =
    '<option value="">教科（全て）</option>' +
    MIRAI_DATA.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

  document.getElementById('filter-visibility').innerHTML = [
    '<option value="">公開状態（全て）</option>',
    '<option value="public">公開のみ</option>',
    '<option value="private">非公開のみ</option>',
  ].join('');

  function render() {
    const q = document.getElementById('search-q').value;
    const industry = document.getElementById('filter-industry').value;
    const subject = document.getElementById('filter-subject').value;
    const vis = document.getElementById('filter-visibility').value;
    let items = STORE.getCurricula({ q, industry, subject });
    if (vis === 'public') items = items.filter(c => c.isPublic);
    if (vis === 'private') items = items.filter(c => !c.isPublic);

    const grid = document.getElementById('library-grid');
    if (items.length === 0) {
      grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">
        <div class="text-7xl mb-4">📭</div>
        <p class="font-black text-xl">カリキュラムが見つかりません</p>
        <p class="text-sm mt-2 font-semibold">フィルタを変更するか、新規作成してください</p>
      </div>`;
      return;
    }
    grid.innerHTML = items.map(c => {
      const ind = MIRAI_UTILS.getIndustryById(c.industry);
      const subj = MIRAI_UTILS.getSubjectById(c.subject);
      return `
        <div class="card-modern overflow-hidden hover-lift group">
          <a href="slide-editor.html?id=${c.id}&mode=view" class="block">
            <div class="relative aspect-[16/9] overflow-hidden" style="background: linear-gradient(135deg, ${ind?.colorHex || '#8b5cf6'}, ${ind?.colorHex || '#8b5cf6'}aa);">
              <img src="${c.thumbnail}" class="absolute inset-0 w-full h-full object-cover opacity-85 group-hover:scale-110 transition duration-700" onerror="this.style.display='none'" />
              <div class="absolute inset-0" style="background: linear-gradient(to top, rgba(0,0,0,0.75), transparent 60%);"></div>
              <span class="absolute top-3 left-3 tag-pill backdrop-blur" style="background: rgba(255,255,255,0.95); color: ${ind?.colorHex || '#8b5cf6'};">${ind?.icon || ''} ${ind?.name || '-'}</span>
              <span class="absolute top-3 right-3 ${c.isPublic ? 'bg-gradient-to-r from-emerald-500 to-cyan-500' : 'bg-slate-600'} text-white text-[10px] font-black px-2.5 py-1 rounded-full shadow-md">${c.isPublic ? '🌐 公開' : '🔒 非公開'}</span>
              <div class="absolute bottom-3 left-3 right-3 text-white">
                <div class="text-[10px] font-black opacity-90 mb-1">${subj?.name || ''} • ${c.sessions}コマ</div>
                <h3 class="font-black text-base leading-tight line-clamp-2">${MIRAI_UTILS.escape(c.title)}</h3>
              </div>
            </div>
          </a>
          <div class="p-4">
            <div class="flex items-center justify-between text-xs mb-3">
              <span class="text-slate-500 font-bold">📅 ${formatDate(c.createdAt)}</span>
              <span class="font-black ${c.compliance >= 85 ? 'text-emerald-600' : 'text-amber-600'}">適合 ${c.compliance}%</span>
            </div>
            <div class="flex items-center justify-between text-[11px] text-slate-500 font-bold">
              <span>👁️ ${c.stats?.views || 0}</span>
              <span>⬇️ ${c.stats?.downloads || 0}</span>
              <span>❤️ ${c.stats?.likes || 0}</span>
            </div>
            <div class="mt-3 pt-3 border-t border-violet-100 flex gap-2">
              <a href="slide-editor.html?id=${c.id}&mode=view" class="flex-1 text-center py-2 rounded-lg bg-violet-50 hover:bg-violet-100 text-violet-700 text-xs font-black transition">編集</a>
              <button onclick="togglePublic('${c.id}')" class="flex-1 py-2 rounded-lg bg-gradient-to-r from-cyan-500 to-violet-500 text-white text-xs font-black hover:scale-105 transition">${c.isPublic ? '非公開化' : '公開化'}</button>
              <button onclick="deleteCurr('${c.id}')" class="px-3 py-2 rounded-lg bg-pink-50 hover:bg-pink-100 text-pink-600 text-xs font-black transition">削除</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  window.togglePublic = (id) => {
    const c = STORE.getCurriculum(id);
    STORE.updateCurriculum(id, { isPublic: !c.isPublic });
    toast(`${!c.isPublic ? '公開' : '非公開'}に変更しました`, 'success');
    render();
  };
  window.deleteCurr = (id) => {
    if (!confirm('このカリキュラムを削除しますか？')) return;
    STORE.deleteCurriculum(id);
    toast('削除しました', 'success');
    render();
  };

  ['search-q','filter-industry','filter-subject','filter-visibility'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
    document.getElementById(id).addEventListener('change', render);
  });
  render();
</script>
</body>
</html>
