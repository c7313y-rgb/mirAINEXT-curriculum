<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>教員ダッシュボード - mirAI Curriculum</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/styles.css" />
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','Noto Sans JP','sans-serif'] }, colors: { violet: {500:'#8b5cf6',600:'#7c3aed'}, pink: {500:'#ec4899'}, cyan: {500:'#06b6d4'} } } } };
</script>
</head>
<body class="font-sans bg-mesh text-slate-900 antialiased">
<main class="p-8 max-w-7xl mx-auto">
  <!-- Welcome -->
  <div class="relative rounded-3xl p-10 mb-6 text-white overflow-hidden shadow-2xl shadow-pink-500/30" style="background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #fb923c 100%);">
    <div class="absolute inset-0 bg-grid-pattern-dark opacity-20"></div>
    <div class="absolute top-0 right-0 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-1/3 w-72 h-72 bg-cyan-300/20 rounded-full blur-3xl"></div>
    <div class="absolute top-10 right-20 text-3xl sparkle">✨</div>
    <div class="absolute top-32 right-52 text-2xl sparkle" style="animation-delay: 0.8s;">🌟</div>

    <div class="relative">
      <div class="text-xs font-black tracking-widest opacity-90">TEACHER DASHBOARD</div>
      <h2 class="mt-2 text-4xl font-black">こんにちは、<span id="userId-display"></span> 先生 ✨</h2>
      <p class="mt-3 text-pink-50 max-w-2xl leading-relaxed">企業発カリキュラムを検索して、あなたの授業にカスタマイズ。生徒の評価データも一元管理できます。</p>
      <div class="mt-6 flex flex-wrap gap-3">
        <a href="library.html" class="inline-flex items-center gap-2 px-6 py-3.5 rounded-2xl bg-white text-pink-600 font-black text-sm shadow-2xl hover:scale-105 transition">
          🔍 カリキュラムを検索 →
        </a>
        <a href="evaluation-dashboard.html" class="inline-flex items-center gap-2 px-6 py-3.5 rounded-2xl glass border border-white/40 text-white font-black text-sm hover:bg-white/20 transition">
          📊 評価ダッシュボード
        </a>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 stagger">
    <div class="card-modern p-6 hover-lift">
      <div class="flex items-center justify-between">
        <div class="text-xs font-black text-slate-500 tracking-wider">利用可能</div>
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-violet-600 text-white flex items-center justify-center text-lg shadow-lg shadow-violet-500/30">📚</div>
      </div>
      <div class="text-4xl font-black mt-3 gradient-text" id="stat-available">0</div>
      <div class="text-xs text-violet-600 mt-1 font-bold">カリキュラム</div>
    </div>
    <div class="card-modern p-6 hover-lift">
      <div class="flex items-center justify-between">
        <div class="text-xs font-black text-slate-500 tracking-wider">業界数</div>
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-pink-500 text-white flex items-center justify-center text-lg shadow-lg shadow-pink-500/30">🏢</div>
      </div>
      <div class="text-4xl font-black mt-3 gradient-text" id="stat-industries">0</div>
      <div class="text-xs text-emerald-600 mt-1 font-bold">パートナー企業</div>
    </div>
    <div class="card-modern p-6 hover-lift">
      <div class="flex items-center justify-between">
        <div class="text-xs font-black text-slate-500 tracking-wider">対応教科</div>
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-coral-500 text-white flex items-center justify-center text-lg shadow-lg shadow-pink-500/30">📖</div>
      </div>
      <div class="text-4xl font-black mt-3 gradient-text-signature" id="stat-subjects">0</div>
      <div class="text-xs text-pink-600 mt-1 font-bold">教科</div>
    </div>
    <div class="card-modern p-6 hover-lift">
      <div class="flex items-center justify-between">
        <div class="text-xs font-black text-slate-500 tracking-wider">評価記録</div>
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-cyan-500 text-white flex items-center justify-center text-lg shadow-lg shadow-emerald-500/30">📊</div>
      </div>
      <div class="text-4xl font-black mt-3 gradient-text" id="stat-evals">0</div>
      <div class="text-xs text-emerald-600 mt-1 font-bold">件</div>
    </div>
  </div>

  <!-- Picked + Quick search -->
  <div class="grid lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 card-modern p-7">
      <div class="flex justify-between items-center mb-5">
        <h3 class="font-black text-lg">👍 おすすめカリキュラム</h3>
        <a href="library.html" class="text-sm text-pink-600 font-black hover:underline">すべて見る →</a>
      </div>
      <div id="picked-list" class="space-y-3"></div>
    </div>

    <div class="card-modern p-7">
      <h3 class="font-black text-lg mb-5">📊 教科別構成</h3>
      <canvas id="subject-chart" height="220"></canvas>
    </div>
  </div>
</main>

<script src="../js/data.js"></script>
<script src="../js/store.js"></script>
<script src="../js/main.js"></script>
<script src="../js/layout.js"></script>
<script>
  MIRAI_LAYOUT.render({ role: 'teacher', activeKey: 'home', title: 'ダッシュボード', subtitle: 'カリキュラムと評価を一元管理' });

  document.getElementById('userId-display').textContent = STORE.data.session.userId || '教員';

  const all = STORE.getCurricula({ publicOnly: true });
  document.getElementById('stat-available').textContent = all.length;
  document.getElementById('stat-industries').textContent = new Set(all.map(c => c.industry)).size;
  document.getElementById('stat-subjects').textContent = new Set(all.map(c => c.subject)).size;
  document.getElementById('stat-evals').textContent = STORE.getEvaluations().length;

  const picked = [...all].sort((a, b) => (b.stats?.views || 0) - (a.stats?.views || 0)).slice(0, 5);
  document.getElementById('picked-list').innerHTML = picked.length === 0
    ? '<div class="text-center py-10 text-slate-400 text-sm font-bold">カリキュラムがありません</div>'
    : picked.map(c => {
        const ind = MIRAI_UTILS.getIndustryById(c.industry);
        const subj = MIRAI_UTILS.getSubjectById(c.subject);
        return `<a href="curriculum-customize.html?id=${c.id}" class="flex items-center gap-4 p-3 rounded-2xl hover:bg-pink-50 border border-transparent hover:border-pink-200 transition">
          <div class="w-16 h-16 rounded-2xl overflow-hidden flex-shrink-0 shadow-md" style="background: linear-gradient(135deg, ${ind?.colorHex || '#8b5cf6'}, ${ind?.colorHex || '#8b5cf6'}aa);">
            <img src="${c.thumbnail}" class="w-full h-full object-cover" onerror="this.style.display='none'" />
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-black text-sm truncate">${MIRAI_UTILS.escape(c.title)}</div>
            <div class="text-xs text-slate-500 mt-0.5 font-semibold">${ind?.icon} ${ind?.name} • ${subj?.name} • ${c.sessions}コマ</div>
            <div class="flex gap-1 mt-1.5">
              ${(c.tags || []).slice(0, 3).map(t => `<span class="text-[9px] bg-violet-100 text-violet-700 px-1.5 py-0.5 rounded font-bold">${MIRAI_UTILS.escape(t)}</span>`).join('')}
            </div>
          </div>
          <div class="text-right">
            <div class="text-xs font-black text-emerald-600">👁️ ${c.stats?.views || 0}</div>
            <div class="text-[10px] text-slate-400 mt-1 font-bold">適合 ${c.compliance}%</div>
          </div>
        </a>`;
      }).join('');

  // Subject chart
  const bySubj = {};
  all.forEach(c => { bySubj[c.subject] = (bySubj[c.subject] || 0) + 1; });
  const labels = Object.keys(bySubj).map(id => MIRAI_UTILS.getSubjectById(id)?.name || id);
  const data = Object.values(bySubj);
  const colors = Object.keys(bySubj).map(id => MIRAI_UTILS.getSubjectById(id)?.color || '#94a3b8');
  if (data.length > 0) {
    new Chart(document.getElementById('subject-chart'), {
      type: 'polarArea',
      data: { labels, datasets: [{ data, backgroundColor: colors.map(c => c + 'cc'), borderWidth: 3, borderColor: '#fff' }] },
      options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, weight: 'bold' } } } } },
    });
  }
</script>
</body>
</html>
